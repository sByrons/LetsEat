
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://wwww.thymeleaf.org">
    <head th:replace="~{layout/plantilla :: head}">
        <title>LetsEat</title>
        <meta charset="UTF-8"/>
      
        
    </head>
    <body>
        <header th:replace="~{layout/plantilla :: header}"/>
        <div class="container my-5">
            <div class="row align-items-center"> 
                <div class="col-md-3"></div>
                <div class="col-md-6">
                    <div class="card rounded-3">
                        
                      <div class="card-body  text-white rounded-3" style="background-color: #07dbb8;">
                       <form method="POST" th:action="@{/login}" class="p-4 rounded" style="background-color: #07dbb8; color: white;">
    <div class="form-group row my-3">
        <label class="col-md-5 my-auto" for="username" style="color: white;">
            <i class="fa-regular fa-user"></i> Username
        </label>
        <div class="col-md-7 my-auto">
            <input class="form-control" type="text" name="username" id="username" />
        </div>
    </div>
    <div class="form-group row my-3">
        <label class="col-md-5 my-auto" for="password" style="color: white;">
            <i class="fa-regular fa-keyboard"></i> Password
        </label>
        <div class="col-md-7 my-auto">
            <input class="form-control" type="password" name="password" id="password" />
        </div>
    </div>
    <div class="card-footer col text-center">
        <a th:href="@{/registro/nuevo}" class="btn  bg-dark text-white me-2">
            <i class="fas fa-user-plus"></i> Registrar
        </a>
        <a th:href="@{/registro/recordar}" class="btn bg-dark text-white me-2">
            <i class="fa-regular fa-address-card"></i> Recordar
        </a>
        <button class="btn bg-dark text-white">
            <i class="fa-regular fa-file"></i> Login
        </button>
    </div>
</form>                           
                        </div>
                    </div>
                    <div th:if="${param.error != null}">
                        <h3>Error</h3>
                    </div>
                </div>
            </div>           
        </div>
        <footer th:replace="~{layout/plantilla :: footer}"/>
    </body>
</html>
